name: Build Container Image

on:
  push:
    tags: ['v*']
  # Allow the release workflow to build the image in the same run (a tag pushed
  # by GITHUB_TOKEN cannot trigger `on: push: tags`), and allow manual rebuilds.
  workflow_call:
    inputs:
      version:
        description: 'Image version tag (e.g. 2026.06.21)'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag to publish (e.g. 2026.06.21). Blank = latest only.'
        type: string
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/neodem-vla-server
          tags: |
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=ref,event=tag
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      # amd64 only: this is a PyTorch VLA inference image that deploys to GPU
      # (amd64) hosts; arm64 builds via QEMU emulation are impractical for the
      # ML dependency stack. (robot-management-system builds multi-arch because
      # its images are lighter Node/nginx services.)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
