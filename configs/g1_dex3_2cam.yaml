# Unitree G1 EDU + Dex3-1 (embodiment "g1_dex3") — two cameras.
#
# For checkpoints fine-tuned with BOTH head cameras
# (cam_left_high + cam_right_high), e.g. n188_2cam_*.
#
# ⚠ Checkpoint pick warning: the latest COMPLETE 2-cam checkpoint is
#   n188_2cam_14k/checkpoint-8000. The serve script's `sort -V | tail -1`
#   auto-pick would select checkpoint-10000, which is TRUNCATED — pass the
#   checkpoint explicitly instead of letting the script auto-pick.
#
# Contract otherwise identical to g1_dex3_1cam.yaml:
#   state arms(14)+hands(14) = 28-dim joint positions [rad], 28-dim absolute
#   position actions, chunk 16, native 480x640 RGB frames,
#   language key "annotation.human.task_description".
#
# Run:
#   python server.py --config configs/g1_dex3_2cam.yaml

model: groot
host: 0.0.0.0
port: 8000

default_task: "Put the bottle into the plate."

groot_host: localhost
groot_port: 6555

# Both frames are forwarded independently at native resolution.
groot_video_keys:
  - cam_left_high
  - cam_right_high
groot_image_size: null  # null = send native 480x640, do NOT resize

groot_language_key: annotation.human.task_description

groot_state_keys:
  arms: 14
  hands: 14
groot_action_keys:
  arms: 14
  hands: 14

groot_timeout_ms: 15000
groot_ping_retries: 3
